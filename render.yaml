services:
  # Django REST Framework Backend Web Service
  - type: web
    name: momentum-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:3001"
      - key: DATABASE_URL
        fromDatabase:
          name: momentum-postgres
          property: connectionString

# PostgreSQL Database Service
databases:
  - name: momentum-postgres
    region: singapore
    plan: free
    databaseName: momentum_db
    user: momentum_user
